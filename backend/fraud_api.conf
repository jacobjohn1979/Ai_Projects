upstream fraud_api {
    server api:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name localhost;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options        "DENY"            always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header X-XSS-Protection       "1; mode=block"   always;
    add_header Referrer-Policy        "no-referrer"     always;

    # ── Health check (no rate limit) ──────────────────────────────────────────
    location = / {
        proxy_pass         http://fraud_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Screening endpoints — rate limited, larger timeout ────────────────────
    location ~* ^/(screen-pdf|screen-image|screen-id-card) {
        limit_req zone=screen burst=5 nodelay;

        proxy_pass          http://fraud_api;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        client_max_body_size 20M;
    }

    # ── Result polling ────────────────────────────────────────────────────────
    location ~* ^/result/ {
        limit_req zone=poll burst=20 nodelay;

        proxy_pass          http://fraud_api;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  10s;
    }

    # ── Submission history ────────────────────────────────────────────────────
    location ~* ^/history/ {
        limit_req zone=poll burst=10 nodelay;

        proxy_pass          http://fraud_api;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── OpenAPI docs ──────────────────────────────────────────────────────────
    location ~* ^/(docs|redoc|openapi.json) {
        proxy_pass          http://fraud_api;
        proxy_set_header    Host            $host;
    }

    # ── Webhook dashboard ─────────────────────────────────────────────────────
    location /webhook-dashboard/ {
        limit_req zone=poll burst=10 nodelay;

        proxy_pass          http://webhook:8001/;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Webhook receiver ──────────────────────────────────────────────────────
    location /webhook/ {
        proxy_pass          http://webhook:8001/webhook/;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Analytics dashboard ───────────────────────────────────────────────────
    location /dashboard/ {
        limit_req zone=poll burst=10 nodelay;

        proxy_pass          http://dashboard:8002/;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Block everything else ─────────────────────────────────────────────────
    location / {
        return 404;
    }
}
