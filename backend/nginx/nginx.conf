user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types application/json text/plain;

    # ── Upload size — allow large ID card / PDF uploads ────────────────────────
    client_max_body_size 20M;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    # 10 req/s per IP on screening endpoints
    limit_req_zone $binary_remote_addr zone=screen:10m rate=10r/s;
    # 30 req/s per IP on result polling
    limit_req_zone $binary_remote_addr zone=poll:10m   rate=30r/s;

    include /etc/nginx/conf.d/*.conf;
}
